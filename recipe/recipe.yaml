schema_version: 1

context:
  name: langchain-protocol
  version: "0.0.15"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/langchain_protocol-${{ version }}.tar.gz
  sha256: 9ab2d11ee73944754f10e037e717098d3a6796f0e58afa9cadda6154e7655ade

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }},<4.0.0
    - typing_extensions >=4.7.0,<5.0.0

tests:
  - python:
      imports:
        - langchain_protocol
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: Python bindings for the LangChain agent streaming protocol
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/langchain-ai/langchain

extra:
  recipe-maintainers:
    - jan-janssen
