{% set name = "langchain-protocol" %}
{% set version = "0.0.14" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/langchain_protocol-{{ version }}.tar.gz
  sha256: bc1e8553122e6ede310280462d5813023a172ff2785ccbbdec54d43f3a15e5f2

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }},<4.0.0
    - typing_extensions >=4.7.0,<5.0.0

test:
  imports:
    - langchain_protocol
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/langchain-ai/langchain
  summary: Python bindings for the LangChain agent streaming protocol
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
